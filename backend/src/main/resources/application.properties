spring.application.name=smartship

# Supabase PostgreSQL - Session Pooler (IPv4 friendly)
# Credentials from environment variables (set before running)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_MS:30000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_MS:0}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.frontend-extra-origins=${FRONTEND_EXTRA_ORIGINS:}
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:120}
app.rate-limit.window-ms=${RATE_LIMIT_WINDOW_MS:60000}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
server.forward-headers-strategy=framework
server.port=${PORT:8080}
server.servlet.session.cookie.name=${SESSION_COOKIE_NAME:SMARTSHIP_SESSION}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:None}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.timeout=${SESSION_TIMEOUT:30d}
